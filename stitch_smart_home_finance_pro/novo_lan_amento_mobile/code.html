<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#f7f9fb",
                    "on-secondary-fixed-variant": "#005236",
                    "on-primary-fixed-variant": "#374765",
                    "surface-variant": "#e0e3e5",
                    "outline-variant": "#c5c6ce",
                    "secondary-fixed": "#6ffbbe",
                    "inverse-primary": "#b6c7eb",
                    "surface-container-highest": "#e0e3e5",
                    "on-primary-container": "#8293b5",
                    "tertiary": "#370003",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#081b38",
                    "secondary-fixed-dim": "#4edea3",
                    "on-tertiary-container": "#ff5754",
                    "primary": "#031632",
                    "error": "#ba1a1a",
                    "surface-dim": "#d8dadc",
                    "surface-container-low": "#f2f4f6",
                    "tertiary-container": "#5e0008",
                    "secondary-container": "#6cf8bb",
                    "surface": "#f7f9fb",
                    "on-surface-variant": "#44474d",
                    "surface-container-high": "#e6e8ea",
                    "surface-bright": "#f7f9fb",
                    "primary-fixed": "#d7e2ff",
                    "on-secondary-fixed": "#002113",
                    "surface-tint": "#4e5f7e",
                    "secondary": "#006c49",
                    "on-tertiary-fixed-variant": "#930013",
                    "on-tertiary-fixed": "#410004",
                    "tertiary-fixed-dim": "#ffb3ad",
                    "on-surface": "#191c1e",
                    "error-container": "#ffdad6",
                    "surface-container": "#eceef0",
                    "on-error-container": "#93000a",
                    "on-secondary-container": "#00714d",
                    "surface-container-lowest": "#ffffff",
                    "inverse-surface": "#2d3133",
                    "on-primary": "#ffffff",
                    "on-error": "#ffffff",
                    "outline": "#75777e",
                    "on-secondary": "#ffffff",
                    "on-background": "#191c1e",
                    "primary-container": "#1a2b48",
                    "primary-fixed-dim": "#b6c7eb",
                    "inverse-on-surface": "#eff1f3",
                    "tertiary-fixed": "#ffdad7"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "8px",
                    "base": "4px",
                    "xl": "32px",
                    "md": "16px",
                    "lg": "24px",
                    "sm": "12px",
                    "gutter": "24px",
                    "container-max": "1440px"
            },
            "fontFamily": {
                    "label-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "display-lg-mobile": ["Inter"],
                    "display-lg": ["Inter"],
                    "body-lg": ["Inter"],
                    "numeric-data": ["Inter"],
                    "headline-md": ["Inter"]
            },
            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "display-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "numeric-data": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        input:focus { outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen">
<!-- Top Navigation Bar (Mobile Adaptation) -->
<header class="fixed top-0 left-0 right-0 h-16 bg-surface-container-lowest flex items-center px-gutter z-50">
<button aria-label="Voltar" class="p-2 -ml-2 text-on-surface-variant active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md ml-md flex-grow">Novo Lançamento</h1>
<button aria-label="Mais Opções" class="p-2 text-on-surface-variant hover:bg-surface-container rounded-full transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<main class="pt-20 pb-32 px-gutter max-w-lg mx-auto">
<!-- Transaction Type Switch -->
<div class="bg-surface-container-low p-base rounded-xl flex mb-lg">
<button class="flex-1 py-md text-center rounded-lg transition-all font-label-sm text-label-sm bg-primary text-on-primary" id="type-expense" onclick="setType('expense')">
                Despesa
            </button>
<button class="flex-1 py-md text-center rounded-lg transition-all font-label-sm text-label-sm text-on-surface-variant" id="type-income" onclick="setType('income')">
                Receita
            </button>
</div>
<!-- Hero Amount Input -->
<div class="mb-xl text-center">
<label class="font-label-sm text-label-sm text-on-surface-variant block mb-xs">Valor do Lançamento</label>
<div class="flex items-center justify-center">
<span class="font-display-lg-mobile text-display-lg-mobile text-primary mr-xs">R$</span>
<input autofocus="" class="w-full max-w-[200px] bg-transparent border-none text-center font-display-lg-mobile text-display-lg-mobile text-primary focus:ring-0 placeholder:text-outline-variant" placeholder="0,00" step="0.01" type="number"/>
</div>
</div>
<!-- Quick Details Form -->
<div class="space-y-lg">
<!-- Title Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant block">Descrição</label>
<input class="w-full p-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg focus:border-primary transition-colors" placeholder="Ex: Supermercado" type="text"/>
</div>
<!-- Date Picker (Simulated) -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant block">Data</label>
<div class="w-full p-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg flex items-center justify-between active:bg-surface-container transition-colors">
<span>Hoje, 24 de Mai</span>
<span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
</div>
</div>
<!-- Category Grid -->
<div class="space-y-md">
<div class="flex items-center justify-between">
<label class="font-label-sm text-label-sm text-on-surface-variant block">Categoria</label>
<button class="text-primary font-label-sm text-label-sm">Ver todas</button>
</div>
<div class="grid grid-cols-4 gap-md">
<!-- Category Item -->
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-active:bg-primary group-active:text-on-primary transition-all shadow-sm">
<span class="material-symbols-outlined">restaurant</span>
</div>
<span class="text-[10px] font-medium text-on-surface-variant truncate w-full text-center">Alimentação</span>
</button>
<!-- Category Item -->
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-active:bg-primary group-active:text-on-primary transition-all shadow-sm">
<span class="material-symbols-outlined">directions_car</span>
</div>
<span class="text-[10px] font-medium text-on-surface-variant truncate w-full text-center">Transporte</span>
</button>
<!-- Category Item -->
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container transition-all shadow-sm ring-2 ring-secondary ring-offset-2">
<span class="material-symbols-outlined">shopping_bag</span>
</div>
<span class="text-[10px] font-bold text-primary truncate w-full text-center">Compras</span>
</button>
<!-- Category Item -->
<button class="flex flex-col items-center gap-xs group">
<div class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant group-active:bg-primary group-active:text-on-primary transition-all shadow-sm">
<span class="material-symbols-outlined">home</span>
</div>
<span class="text-[10px] font-medium text-on-surface-variant truncate w-full text-center">Moradia</span>
</button>
</div>
</div>
<!-- Account Selection -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant block">Conta / Cartão</label>
<div class="flex items-center gap-md p-md bg-surface-container-lowest border border-outline-variant rounded-lg active:bg-surface-container transition-colors">
<div class="w-10 h-6 bg-primary rounded flex items-center justify-center text-[8px] text-on-primary font-bold">VISA</div>
<div class="flex-grow">
<p class="font-body-md text-body-md font-semibold">Nubank Platinum</p>
<p class="text-[10px] text-on-surface-variant uppercase tracking-wider">Final 4492</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</div>
</div>
<!-- Advanced Options Toggle -->
<button class="w-full flex items-center justify-center gap-xs py-md text-on-surface-variant font-label-sm text-label-sm border border-dashed border-outline-variant rounded-lg active:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[20px]">add</span>
                Adicionar anexos ou repetições
            </button>
</div>
</main>
<!-- Fixed Action Footer -->
<footer class="fixed bottom-0 left-0 right-0 p-gutter bg-surface-container-lowest flex flex-col gap-md shadow-[0_-4px_16px_rgba(3,22,50,0.08)] z-50">
<button class="w-full bg-primary text-on-primary py-lg rounded-xl font-headline-md text-headline-md shadow-lg active:scale-[0.98] transition-transform">
            Salvar Transação
        </button>
</footer>
<!-- Decorative Element -->
<div class="fixed top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 blur-3xl pointer-events-none"></div>
<script>
        function setType(type) {
            const expenseBtn = document.getElementById('type-expense');
            const incomeBtn = document.getElementById('type-income');
            
            if (type === 'expense') {
                expenseBtn.className = "flex-1 py-md text-center rounded-lg transition-all font-label-sm text-label-sm bg-primary text-on-primary";
                incomeBtn.className = "flex-1 py-md text-center rounded-lg transition-all font-label-sm text-label-sm text-on-surface-variant";
            } else {
                incomeBtn.className = "flex-1 py-md text-center rounded-lg transition-all font-label-sm text-label-sm bg-secondary text-on-secondary";
                expenseBtn.className = "flex-1 py-md text-center rounded-lg transition-all font-label-sm text-label-sm text-on-surface-variant";
            }
        }
    </script>
</body></html>

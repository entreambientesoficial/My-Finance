version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myfinance_backend_prod
    restart: unless-stopped
    ports:
      - '3001:3001'
    volumes:
      - backend_uploads:/usr/src/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - JWT_SECRET=${JWT_SECRET:-super-secret-prod-key-change-me}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      # E-mail config defaults for notification mailers
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: myfinance_frontend_prod
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}

volumes:
  backend_uploads:

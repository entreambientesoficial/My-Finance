name: CI/CD — My-Finance

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# ─── BACKEND CI ────────────────────────────────────────────────────────────────
jobs:
  backend-ci:
    name: 🔧 Backend — Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend

      - name: Lint
        run: npm run lint --if-present
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

# ─── FRONTEND CI ───────────────────────────────────────────────────────────────
  frontend-ci:
    name: 🎨 Frontend — Build & Type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type-check
        run: npm run type-check --if-present
        working-directory: frontend

      - name: Build (Cloudflare Pages)
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://placeholder.railway.app' }}

# ─── DEPLOY BACKEND → RAILWAY (só na branch main após CI passar) ───────────────
  deploy-backend:
    name: 🚀 Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: [backend-ci]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service my-finance-backend --detach
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

# ─── DEPLOY FRONTEND → CLOUDFLARE PAGES (só na branch main após CI passar) ────
  deploy-frontend:
    name: 🌐 Deploy Frontend → Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [frontend-ci]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build para Cloudflare Pages
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy para Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: my-finance
          directory: frontend/.next
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'
